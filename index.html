<!-- Nav Logic -->
<script>
	const slider = document.querySelector('nav');
	let isDown = false;
	let startX;
	let scrollLeft;

	slider.addEventListener('mousedown', (e) => {
	  isDown = true;
	  startX = e.pageX - slider.offsetLeft;
	  scrollLeft = slider.scrollLeft;
	});

	slider.addEventListener('mouseleave', () => {
	  isDown = false;
	});

	slider.addEventListener('mouseup', () => {
	  isDown = false;
	});

	slider.addEventListener('mousemove', (e) => {
	  if (!isDown) return; // Stop the function from running if not clicked
	  e.preventDefault();
	  const x = e.pageX - slider.offsetLeft;
	  const walk = (x - startX) * 2; // Multiply by 2 to scroll faster
	  slider.scrollLeft = scrollLeft - walk;
	});
</script>

    <!-- Check for Cloudflare Server Outage -->
    <div id="cloudflare-status">Cloudflare Status: Checking...</div>
    <script>
    async function checkCloudflareStatus() {
      const statusEl = document.getElementById('cloudflare-status');
      try {
        const response = await fetch('https://www.cloudflarestatus.com/api/v2/summary.json');
        const data = await response.json();
        
        const indicator = data.status.indicator;
        const description = data.status.description;

        if (indicator === 'none') {
          statusEl.innerHTML = `Cloudflare Status: <span style="color: green;">All Systems Operational</span>`;
        } else {
          statusEl.innerHTML = `Cloudflare Status: <a href="https://www.cloudflarestatus.com/" style="color: orange;">${description}</a>`;
        }
      } catch (error) {
        statusEl.innerHTML = `Cloudflare Status: <span style="color: red;">Failed to load</span>`;
      }
    }
    checkCloudflareStatus();
    </script>
